name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor deps
        run: npm install

      - name: Build web assets
        run: npx cap sync android

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # Diagnostics
          echo "=== SDK contents ==="
          ls $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "no platforms"
          ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "no build-tools"
          # Accept licenses
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          # Install SDK 34 if missing
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || echo "sdkmanager skipped"

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AirdropHunter-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
